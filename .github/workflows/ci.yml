name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build packages (engine + server expose dist/ via package.json exports)
        # engine/server have package.json "exports" pointing to dist/, so
        # server/web tests need engine's dist/ to exist. Build the whole
        # workspace once before running tests.
        run: pnpm -r build

      - name: Test
        run: pnpm test --run

      - name: Build (tsc + vite)
        run: pnpm build
